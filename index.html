<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetria Agrícola - AgroTech</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <div class="container">
        <!-- Barra Lateral -->
        <aside class="sidebar">
            <h2>AgroTech 🚜</h2>
            <nav>
                <ul>
                    <li class="active"><a href="#">Dashboard</a></li>
                    <li><a href="#">Frota</a></li>
                    <li><a href="#">Alertas</a></li>
                    <li><a href="#">Relatórios</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <header>
                <h1>Painel de Telemetria</h1>
                <div class="status-geral">Status do Sistema: <span class="online">Online</span></div>
            </header>

            <!-- Cartões de Métricas -->
            <section class="cards-grid">
                <div class="card">
                    <h3>Máquinas Ativas</h3>
                    <p class="valor" id="maquinas-ativas">0/0</p>
                </div>
                <div class="card">
                    <h3>Consumo Médio</h3>
                    <p class="valor" id="consumo-medio">0 L/h</p>
                </div>
                <div class="card">
                    <h3>Área Trabalhada</h3>
                    <p class="valor" id="area-trabalhada">0 ha</p>
                </div>
            </section>

            <!-- Seção de Gráficos e Alertas -->
            <section class="data-section">
                <div class="chart-container">
                    <h3>Eficiência do Combustível por Máquina</h3>
                    <canvas id="telemetryChart"></canvas>
                </div>
                <div class="alerts-container">
                    <h3>Alertas em Tempo Real</h3>
                    <ul id="alerts-list">
                        <!-- Alertas inseridos via JS -->
                    </ul>
                </div>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
