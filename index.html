<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroTech - Telemetria Agrícola</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h2>Agro<span>Tech</span></h2>
            <nav>
                <ul>
                    <li class="active"><a href="#">Dashboard</a></li>
                    <li><a href="#">Frota</a></li>
                    <li><a href="#">Histórico</a></li>
                    <li><a href="#">Alertas</a></li>
                </ul>
            </nav>
            <div class="status-geral">
                <p>Status da Frota: <strong id="frota-status">100% Online</strong></p>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <h1>Painel de Telemetria em Tempo Real</h1>
                <div class="maquina-selector">
                    <label for="maquina">Selecionar Máquina: </label>
                    <select id="maquina">
                        <option value="trator-01">Trator John Deere 6115J (ID: #01)</option>
                        <option value="colheitadeira-01">Colheitadeira Case IH 8250 (ID: #02)</option>
                    </select>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="card">
                    <h3>Velocidade Atual</h3>
                    <div class="value"><span id="vel-val">6.5</span> <small>km/h</small></div>
                    <p class="card-footer">Velocidade ideal de plantio</p>
                </div>

                <div class="card">
                    <h3>Nível de Combustível</h3>
                    <div class="value"><span id="comb-val">78</span> <small>%</small></div>
                    <p class="card-footer">Autonomia de aprox. 12h</p>
                </div>

                <div class="card">
                    <h3>Temp. do Motor</h3>
                    <div class="value"><span id="temp-val">85</span> <small>°C</small></div>
                    <p class="card-footer">Temperatura operacional normal</p>
                </div>
            </section>
        </main>
    </div> </body>
</html>
